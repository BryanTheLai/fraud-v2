name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev --extra infra --extra llm
      - name: Format check
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Secrets scan
        run: uv run fraud-v2 secrets-scan --root .
      - name: Typecheck
        run: uv run mypy src
      - name: Test
        run: uv run pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate full compose profile
        run: docker compose -f infra/docker-compose.yml --profile full config --quiet
      - name: Build API image
        run: docker build -t fraud-v2:ci .
      - name: Smoke API image
        shell: bash
        run: |
          docker run -d --rm --name fraud-v2-ci -p 8000:8000 -e FRAUD_API_TOKEN=dev-token-change-me fraud-v2:ci
          trap 'docker stop fraud-v2-ci' EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health/live; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health/ready
          curl -fsS -X POST -H "Authorization: Bearer dev-token-change-me" "http://127.0.0.1:8000/v1/synthetic/generate?users=30"
          curl -fsS -X POST \
            -H "Authorization: Bearer dev-token-change-me" \
            -H "Content-Type: application/json" \
            -d '{"target_entity":{"entity_type":"USER","entity_id":"user_00000"},"as_of":"2026-05-10T00:00:00Z","amount":1000,"context":{}}' \
            http://127.0.0.1:8000/v1/decisions/score > /tmp/decision.json
          python - <<'PY'
          import json
          from pathlib import Path

          decision = json.loads(Path("/tmp/decision.json").read_text())
          assert decision["risk_score"] >= 80
          assert decision["risk_tier"] == "RED"
          PY
          curl -fsS http://127.0.0.1:8000/metrics | grep fraud_decisions_total
