groups:
  - name: fraud-v2-local-slo
    rules:
      - alert: FraudV2APIUnavailable
        expr: up{job="fraud-v2-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Fraud V2 API scrape target is down.
          description: Prometheus cannot scrape the local Fraud V2 API.

      - alert: FraudV2DecisionLatencyP95High
        expr: histogram_quantile(0.95, sum(rate(fraud_decision_latency_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Fraud V2 decision p95 latency is above 500ms.
          description: Local decision scoring is above the target laptop SLO.

      - alert: FraudV2HTTPServerErrors
        expr: sum(rate(fraud_http_requests_total{status=~"5.."}[5m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Fraud V2 API is returning 5xx responses.
          description: The local API returned server errors in the last 5 minutes.
