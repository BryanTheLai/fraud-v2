services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      FRAUD_ENV: local
      FRAUD_SQLITE_PATH: /app/data/local/fraud_v2.sqlite
      FRAUD_API_TOKEN: dev-token-change-me
    ports:
      - "8000:8000"
    profiles: ["full"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud_v2
    ports:
      - "5432:5432"
    profiles: ["full"]

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    profiles: ["full"]

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 768M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
    ports:
      - "9092:9092"
      - "9644:9644"
    profiles: ["full"]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/fraud-local-password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    profiles: ["full"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    profiles: ["full"]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    profiles: ["full"]
